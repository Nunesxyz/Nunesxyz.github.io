<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor de Apostila</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
}

body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
}

/* CONTAINER */
.viewer {
    width: 90%;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 0 120px;
}

/* HEADER */
.header {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
}

/* AREA DO PDF (placeholder) */
.pdf-area {
    width: 100%;
    height: 70vh;
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.6;
}

/* CONTROLES */
.controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 14px;
    padding: 12px;
    display: flex;
    gap: 8px;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}

/* BOTÕES */
.controls button {
    background: #111;
    border: 1px solid #333;
    color: #fff;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.controls button:hover {
    border-color: #fff;
}

/* INPUT */
.controls input {
    width: 60px;
    height: 36px;
    background: #111;
    border: 1px solid #333;
    color: #fff;
    border-radius: 8px;
    text-align: center;
}

/* TEXTO */
.page-info {
    font-size: 12px;
    opacity: 0.6;
    margin: 0 5px;
}
</style>
</head>

<body>

<div class="viewer">

<div class="header">
<i data-lucide="book-open"></i> Apostila
</div>

<div class="pdf-area">
<iframe 
    src="https://drive.google.com/file/d/1JP76a15esH7TP0m-rZDy8OIPB1U5d4OR/preview"
    width="100%"
    height="100%"
    style="border:0; border-radius:14px;">
</iframe>
</div>

</div>

<!-- CONTROLES -->
<div class="controls">

<button>
<i data-lucide="chevron-left"></i>
</button>

<span class="page-info">1 / 300</span>

<button>
<i data-lucide="chevron-right"></i>
</button>

<input type="number" placeholder="Pg">

<button>
Ir
</button>

</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
