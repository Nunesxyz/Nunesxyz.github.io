<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor de Apostila</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
}

body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
}

/* CONTAINER */
.viewer {
    width: 90%;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 0 120px;
}

/* HEADER */
.header {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
}

/* AREA DO PDF */
.pdf-area {
    width: 100%;
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* CONTROLES */
.controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 14px;
    padding: 12px;
    display: flex;
    gap: 8px;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}

/* BOTÕES */
.controls button {
    background: #111;
    border: 1px solid #333;
    color: #fff;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.controls button:hover {
    border-color: #fff;
}
</style>
</head>

<body>

<div class="viewer">

<div class="header">
<i data-lucide="book-open"></i> Apostila
</div>

<div class="pdf-area">
<img 
    src="https://raw.githubusercontent.com/Nunesxyz/Nunesxyz.github.io/main/HCGMpdf.png"
    style="width:100%; height:auto; display:block;"></div>

<!-- CONTROLES (apenas download) -->
<div class="controls">

<button onclick="window.open('https://drive.google.com/uc?export=download&id=1JP76a15esH7TP0m-rZDy8OIPB1U5d4OR','_blank')">
<i data-lucide="download"></i>
</button>

</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
