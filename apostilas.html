<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apostilas</title>

<link rel="icon" href="https://raw.githubusercontent.com/Nunesxyz/Nunesxyz.github.io/main/code.png?v=2">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
}

body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
}

.dashboard {
    width: 90%;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 0 120px;
}

.header {
    margin-bottom: 20px;
    font-size: 22px;
    font-weight: 600;
}

/* APOSTILAS */
.apostilas {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.apostila-card {
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 14px;
    padding: 16px;
    cursor: pointer;
    transition: 0.3s ease;
}

.apostila-card:hover {
    transform: translateY(-8px);
    border-color: #fff;
    box-shadow: 0 10px 25px rgba(255,255,255,0.1);
}

.apostila-info {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.apostila-name {
    font-size: 15px;
    font-weight: 600;
}

.apostila-meta {
    font-size: 12px;
    opacity: 0.6;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.apostila-meta span {
    display: flex;
    align-items: center;
    gap: 5px;
}

.apostila-progress-bar-wrap {
    width: 100%;
    height: 6px;
    background: #111;
    border-radius: 6px;
    overflow: hidden;
}

.apostila-progress-bar-fill {
    height: 100%;
    background: #fff;
    width: 0%;
    transition: width 0.3s;
}

.section-title {
    font-size: 18px;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
}

</style>
</head>

<body>

<div class="dashboard">

<div class="section-title">
  <i data-lucide="book-open"></i> Apostilas
</div>

<div class="apostilas">

<div class="apostila-card" onclick="openApostila('hist_cien_ing_pv_9_v1')">
  <div class="apostila-info">
    <div class="apostila-name">História, Ciências, Inglês e Projeto de Vida</div>
    <div class="apostila-meta">
      <span><i data-lucide="file-text"></i> Pág. 1 de 338 · 0%</span>
      <span><i data-lucide="bookmark"></i> Vol. 2</span>
    </div>
    <div class="apostila-progress-bar-wrap">
      <div class="apostila-progress-bar-fill" style="width:0%"></div>
    </div>
  </div>
</div>

<div class="apostila-card" onclick="openApostila('port_mat_9_v1')">
  <div class="apostila-info">
    <div class="apostila-name">Português e Matemática</div>
    <div class="apostila-meta">
      <span><i data-lucide="file-text"></i> Pág. 1 de 290 · 0%</span>
      <span><i data-lucide="bookmark"></i> Vol. 2</span>
    </div>
    <div class="apostila-progress-bar-wrap">
      <div class="apostila-progress-bar-fill" style="width:0%"></div>
    </div>
  </div>
</div>

</div>

</div>

<script>
lucide.createIcons();

function openApostila(id){
    if(id === "hist_cien_ing_pv_9_v1"){
        window.location.href = "apostilas/Apostilas.html";
    }

    if(id === "port_mat_9_v1"){
        window.location.href = "apostilas/Apostilas2.html";
    }
}
</script>

</body>
      </html>
