<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matific Task Helper</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:Inter,sans-serif;
    background:#000;
    color:#fff;
}

.dashboard{
    width:92%;
    max-width:980px;
    margin:0 auto;
    padding:35px 0 120px;
}

.header{
    font-size:22px;
    font-weight:600;
    margin-bottom:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:18px;
}

.card{
    background:#0a0a0a;
    border:1px solid #1f1f1f;
    border-radius:14px;
    padding:16px;
    transition:.25s;
}

.card:hover{
    border-color:#444;
}

.title{
    font-size:14px;
    opacity:.7;
    margin-bottom:10px;
    display:flex;
    gap:8px;
    align-items:center;
}

input{
    width:100%;
    padding:10px;
    margin:6px 0;
    background:#0f0f0f;
    border:1px solid #222;
    border-radius:8px;
    color:#fff;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    background:#fff;
    border:none;
    border-radius:10px;
    font-weight:600;
    margin-top:10px;
    cursor: pointer;
}

.result{
    margin-top:10px;
    font-size:13px;
    opacity:.8;
    white-space:pre-wrap;
    min-height: 20px;
}

.kb{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:6px;
    margin-top:10px;
}

.kb button{
    padding:8px;
    background:#111;
    color:#fff;
    border:1px solid #222;
    font-size:13px;
    margin-top: 0;
}
</style>
</head>

<body>

<div class="dashboard">
<div class="header">Matific Task Helper</div>

<div class="grid">

<!-- Calculadora Geral -->
<div class="card">
<div class="title"><i data-lucide="calculator"></i> Calculadora Geral</div>
<input id="expr" readonly placeholder="Expressão">

<div class="kb">
<button onclick="typeKey('7')">7</button>
<button onclick="typeKey('8')">8</button>
<button onclick="typeKey('9')">9</button>
<button onclick="typeKey('/')">/</button>
<button onclick="typeKey('(')">(</button>

<button onclick="typeKey('4')">4</button>
<button onclick="typeKey('5')">5</button>
<button onclick="typeKey('6')">6</button>
<button onclick="typeKey('*')">*</button>
<button onclick="typeKey(')')">)</button>

<button onclick="typeKey('1')">1</button>
<button onclick="typeKey('2')">2</button>
<button onclick="typeKey('3')">3</button>
<button onclick="typeKey('-')">-</button>
<button onclick="typeKey('!')">!</button>

<button onclick="typeKey('0')">0</button>
<button onclick="typeKey('.')">.</button>
<button onclick="typeKey('+')">+</button>
<button onclick="typeKey('^')">^</button>
<button onclick="back()">⌫</button>
</div>

<button onclick="calc()">Calcular</button>
<div class="result" id="res1"></div>
</div>

<!-- NOVO CARD: POTÊNCIA E RAÍZES -->
<div class="card">
<div class="title"><i data-lucide="info"></i> Potência & Raízes</div>
<input id="val_base" readonly placeholder="Número Base">
<input id="val_exp" readonly placeholder="Expoente (só p/ elevado)">

<div class="kb">
<button onclick="typeKey('7')">7</button>
<button onclick="typeKey('8')">8</button>
<button onclick="typeKey('9')">9</button>
<button onclick="back()">⌫</button>
<button onclick="clearFields()">C</button>

<button onclick="typeKey('4')">4</button>
<button onclick="typeKey('5')">5</button>
<button onclick="typeKey('6')">6</button>
<button onclick="calcAdvanced('pow')">xʸ</button>
<button onclick="calcAdvanced('sqrt')">√</button>

<button onclick="typeKey('1')">1</button>
<button onclick="typeKey('2')">2</button>
<button onclick="typeKey('3')">3</button>
<button onclick="calcAdvanced('cbrt')">∛</button>
<button onclick="typeKey('0')">0</button>
</div>
<div class="result" id="res_adv"></div>
</div>

<div class="card">
<div class="title"><i data-lucide="sigma"></i> Fração / Potência</div>
<input id="num" readonly placeholder="Numerador">
<input id="den" readonly placeholder="Denominador">

<div class="kb">
<button onclick="typeKey('7')">7</button>
<button onclick="typeKey('8')">8</button>
<button onclick="typeKey('9')">9</button>
<button onclick="typeKey('^')">^</button>
<button onclick="back()">⌫</button>

<button onclick="typeKey('4')">4</button>
<button onclick="typeKey('5')">5</button>
<button onclick="typeKey('6')">6</button>
<button onclick="typeKey('/')">/</button>
<button onclick="typeKey('(')">(</button>

<button onclick="typeKey('1')">1</button>
<button onclick="typeKey('2')">2</button>
<button onclick="typeKey('3')">3</button>
<button onclick="typeKey('!')">!</button>
<button onclick="typeKey(')')">)</button>
</div>

<button onclick="frac()">Resolver</button>
<div class="result" id="res2"></div>
</div>

<div class="card">
<div class="title"><i data-lucide="fuel"></i> Conversão</div>
<input id="gas" placeholder="texto por extenso">
<button onclick="parseGas()">Pesquisar</button>
<div class="result" id="res3"></div>
</div>

</div>
</div>

<script>
lucide.createIcons();

let activeField = document.getElementById("expr");

document.querySelectorAll("input").forEach(i=>{
    i.addEventListener("click",()=>{
        activeField = i;
    });
});

function typeKey(v){
    if(!activeField) return;
    activeField.value += v;
}

function back(){
    if(!activeField) return;
    activeField.value = activeField.value.slice(0,-1);
}

function clearFields(){
    if(activeField) activeField.value = "";
}

/* bloqueio teclado físico */
["expr","num","den","gas","val_base","val_exp"].forEach(id=>{
    let el=document.getElementById(id);
    if(el){
        el.addEventListener("keydown",e=>e.preventDefault());
        el.addEventListener("paste",e=>e.preventDefault());
    }
});

function safe(e){
    try{
        e=e.replace(/\^/g,"**");
        return Function("return "+e)();
    }catch{return NaN;}
}

function fix(n){
    if(isNaN(n)) return 0;
    return Math.round(n*1000)/1000;
}

function calc(){
    let r = safe(document.getElementById("expr").value);
    document.getElementById("res1").innerText = "Exato: " + r + "\nAproximado: " + fix(r);
}

function frac(){
    let n=safe(document.getElementById("num").value);
    let d=safe(document.getElementById("den").value);
    if(d==0){
        document.getElementById("res2").innerText="Erro: div por 0";
        return;
    }
    let r = n/d;
    document.getElementById("res2").innerText = "Exato: " + r + "\nAproximado: " + fix(r);
}

function calcAdvanced(tipo){
    let b = parseFloat(document.getElementById("val_base").value);
    let e = parseFloat(document.getElementById("val_exp").value);
    let res = 0;
    let label = "";

    if(tipo === 'pow'){
        res = Math.pow(b, e);
        label = b + " ^ " + e;
    } else if(tipo === 'sqrt'){
        res = Math.sqrt(b);
        label = "√" + b;
    } else if(tipo === 'cbrt'){
        res = Math.cbrt(b);
        label = "∛" + b;
    }

    document.getElementById("res_adv").innerText = label + " = " + res + "\nAproximado: " + fix(res);
}

function parseGas(){
    let txt=document.getElementById("gas").value;
    window.open("https://www.google.com/search?q="+encodeURIComponent(txt),"_blank");
    document.getElementById("res3").innerText="Pesquisado: "+txt;
}
</script>

</body>
    </html>
