<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Nunesxyz</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
}

body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
}

.dashboard {
    width: 90%;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 0 120px;
}

.header {
    margin-bottom: 20px;
    font-size: 22px;
    font-weight: 600;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.card {
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 14px;
    padding: 20px;
    transition: 0.3s ease;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    border-color: #fff;
    box-shadow: 0 10px 30px rgba(255,255,255,0.12);
}

.card-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 15px;
    opacity: 0.8;
}

.value {
    font-size: 28px;
    font-weight: 600;
}

.label {
    font-size: 13px;
    opacity: 0.6;
}

.section-title {
    font-size: 18px;
    margin-bottom: 15px;
}

.script-card {
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 14px;
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: 0.3s;
    text-decoration: none;
    color: #fff;
}

.script-card:hover {
    transform: translateY(-8px);
    border-color: #fff;
    box-shadow: 0 10px 25px rgba(255,255,255,0.1);
}

#equipe-heading {
    margin-top: 40px;
    margin-bottom: 15px;
    font-size: 18px;
}

.team-layout {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.team-row {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.team-card {
    flex: 0 0 240px;
    max-width: 240px;
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.3s;
}

.team-card:hover {
    transform: translateY(-6px);
    border-color: #fff;
}

.team-avatar {
    width: 100%;
    height: 140px;
    object-fit: cover;
}

.team-card-body {
    padding: 12px;
}

.team-role-label {
    font-size: 11px;
    opacity: 0.5;
}

.team-name {
    font-size: 14px;
    font-weight: 600;
}

.team-username {
    font-size: 12px;
    opacity: 0.6;
}

/* PLAYER */
.music-player {
    position: fixed;
    top: 15px;
    left: 15px;
    width: 150px;
    height: 150px;
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 16px;
    padding: 10px;
    z-index: 9999;
    cursor: grab;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    touch-action: none;
}

.music-player:active {
    cursor: grabbing;
}

.music-title {
    font-size: 10px;
    text-align: center;
    opacity: 0.8;
}

.disc {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    border: 2px solid #fff;
    animation: spin 3s linear infinite;
    animation-play-state: paused;
}

.playing .disc {
    animation-play-state: running;
}

.waves {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 14px;
}

.waves span {
    width: 2px;
    height: 4px;
    background: #fff;
    animation: wave 1s infinite;
}

@keyframes wave {
    0%,100%{height:4px;}
    50%{height:14px;}
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.controls {
    display: flex;
    gap: 5px;
}

.controls button {
    background: #111;
    border: 1px solid #333;
    color: #fff;
    font-size: 10px;
    padding: 3px 5px;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

    " target="_blank">
<i data-lucide="sparkles"></i>

<h2 id="equipe-heading">Equipe</h2>

<div class="team-layout">
<div class="team-row">

<div class="team-card">
<img class="team-avatar" src="https://github.com/Nunesxyz.png">

<div class="team-card">

</div>

</div>

<!-- PLAYER -->
<div class="music-player" id="player">
<div class="music-title" id="title">To Be Continued</div>

<div class="disc"></div>

<div class="waves">
<span></span><span></span><span></span><span></span><span></span>
</div>

<button onclick="prev()">⏮</button>
<button onclick="toggle()">⏯</button>
<button onclick="next()">⏭</button>
</div>
</div>

<audio id="audio"></audio>

<script>
lucide.createIcons();

/* COPY JS */
const tarefaSPJS = `javascript:(function(){var qCards=document.querySelectorAll('div[questao]'),p="Aja como um aluno de 9º ano. Resolva em JSON: {\"gabarito\":{\"1\":\"A, B\",\"2\":\"Frase ordenada\",\"3\":\"Resposta dissertativa\",\"4\":\"PALAVRA\"}}. REGRAS: 1. Nas questões de ordenar, use EXATAMENTE as peças fornecidas, sem trocar pontos ou letras. 2. Se a questão for de preencher quadradinhos (blocos), responda a palavra ou letra correspondente. 3. Responda APENAS o JSON puro. Base:\n\n";qCards.forEach((c,i)=>{var e=c.querySelector('.ql-editor')?.innerText||"",pks=Array.from(c.querySelectorAll('.css-12g5loc')).map(k=>k.innerText).join(', '),alts=Array.from(c.querySelectorAll('.ql-editor p')).filter(el=>el.innerText.match(/^[A-E]\)/)).map(el=>el.innerText).join(' | '),ins=c.querySelectorAll('input[tipoatividade="tarefa"]').length;p+="Q"+(i+1)+": "+e+(pks?" (PEÇAS: "+pks+")":"")+(alts?" (OPÇÕES: "+alts+")":"")+(ins?" (LACUNAS: "+ins+" blocos)":"")+"\n\n"});var d=document.createElement('div');Object.assign(d.style,{position:'fixed',top:'1%',left:'5%',width:'90%',zIndex:'100000',backgroundColor:'#000',border:'1px solid #333',borderRadius:'16px',padding:'15px',color:'#fff',fontFamily:'sans-serif',boxShadow:'0 10px 30px #000',maxHeight:'98vh',overflowY:'auto'});d.innerHTML='<div style="text-align:center;margin-bottom:10px;"><div style="font-weight:700;font-size:18px;">TarefaSP Maker Ultra</div><div style="font-size:11px;opacity:0.8;">Nunesxyz - Fix Final 2.0</div></div><button id="bg" style="width:100%;background:#fff;color:#000;border:none;padding:12px;border-radius:10px;font-weight:700;margin-bottom:10px;cursor:pointer;">Enviar ao ChatGPT</button><textarea id="ij" placeholder="Aguardando JSON..." style="width:100%;height:45px;background:#0a0a0a;color:#00d2ff;border:1px solid #222;border-radius:10px;padding:5px;font-size:11px;"></textarea><div id="pre" style="display:none;margin-top:10px;background:#0a0a0a;padding:12px;border-radius:10px;"><div id="vr" style="color:#ccc;font-size:12px;white-space:pre-wrap;"></div></div><button id="ba" style="width:100%;background:#00f;color:#fff;border:none;padding:12px;border-radius:10px;margin-top:10px;font-weight:600;cursor:pointer;">Injetar</button><center><button id="bx" style="background:none;color:#888;border:none;margin-top:10px;cursor:pointer;">[ Fechar ]</button></center>';document.body.appendChild(d);const ij=document.getElementById('ij'),pre=document.getElementById('pre'),vr=document.getElementById('vr');function up(){try{var m=ij.value.match(/\{[\s\S]*\}/);if(!m)return;var j=JSON.parse(m[0]);if(j.gabarito){pre.style.display='block';vr.innerText=JSON.stringify(j.gabarito,null,2)}}catch(e){}}document.getElementById('bx').onclick=()=>d.remove();document.getElementById('bg').onclick=()=>{window.open('https://chatgpt.com/?q='+encodeURIComponent(p),'_blank');setInterval(async()=>{try{const t=await navigator.clipboard.readText();if(t.includes('"gabarito"')&&t!==ij.value){ij.value=t;up()}}catch(e){}},1000)};document.getElementById('ba').onclick=()=>{try{var m=ij.value.match(/\{[\s\S]*\}/);if(!m)return alert("JSON inválido");var j=JSON.parse(m[0]),g=j.gabarito;qCards.forEach((card,idx)=>{var res=g[idx+1];if(!res)return;var inps=card.querySelectorAll('input[tipoatividade="tarefa"]');if(inps.length>0){var cR=res.toString().replace(/\s/g,'');inps.forEach((n,i)=>{if(cR[i]){var s=Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype,"value").set;s.call(n,cR[i]);n.dispatchEvent(new Event('input',{bubbles:true}))}})}var pks=Array.from(card.querySelectorAll('.css-12g5loc'));if(pks.length>0&&res.toString().includes(' ')){var pls=res.split(' ').map(w=>w.replace(/[.,!?;]/g,'').toLowerCase());pls.forEach((w,pi)=>{setTimeout(()=>{var a=pks.find(k=>k.innerText.replace(/[.,!?;]/g,'').toLowerCase()===w);if(a)a.click()},pi*200)})}var rads=card.querySelectorAll('input[type="radio"], input[type="checkbox"]');if(res.length<=5){var resL=res.split(',').map(s=>s.trim().toUpperCase());resL.forEach(r=>{if(r.length==1){var o=r.charCodeAt(0)-65;if(rads[o]&&!rads[o].checked)rads[o].click()}})}var txt=card.querySelector('textarea');if(txt){var val=Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype,"value").set;val.call(txt,res);txt.dispatchEvent(new Event('input',{bubbles:true}))}});function loopGuia(){qCards.forEach((card,idx)=>{var res=g[idx+1];if(!res)return;var pks=Array.from(card.querySelectorAll('.css-12g5loc'));if(pks.length>0){var pRes=res.split(' ').filter(word=>word.length>0);var prox="";for(var pW of pRes){var alvo=pW.replace(/[.,!?;]/g,'');if(pks.some(el=>el.innerText.replace(/[.,!?;]/g,'')===alvo)){prox=alvo;break}}pks.forEach(el=>{var limpo=el.innerText.replace(/[.,!?;]/g,'');if(limpo===prox){el.style.backgroundColor="#00ff00";el.style.color="#000";el.style.opacity="1"}else{el.style.backgroundColor="#ff0000";el.style.opacity="0.2"}}) } })}setInterval(loopGuia,800);alert("Injetado!");d.remove()}catch(e){alert("Erro no JSON")}};ij.oninput=up;})()`;
const redacaoJS = ``;

document.getElementById("tarefaSP").onclick=()=>navigator.clipboard.writeText(tarefaSPJS);
document.getElementById("redacaoIA").onclick=()=>navigator.clipboard.writeText(redacaoJS);

/* PLAYER */
let i=0;
const audio=document.getElementById("audio");
const player=document.getElementById("player");
const title=document.getElementById("title");

const playlist=[
{title:"To Be Continued",src:"https://raw.githubusercontent.com/Nunesxyz/musicas-6/main/To_Be_Continued.mp3"},
{title:"Soldier Poet King",src:"https://raw.githubusercontent.com/Nunesxyz/musicas-6/main/soldier_poet_king.mp3"}
];

function load(index){
i=index;
audio.src=playlist[i].src;
title.innerText=playlist[i].title;
audio.play().catch(()=>{});
player.classList.add("playing");
}

function toggle(){
if(audio.paused){
audio.play().catch(()=>{});
player.classList.add("playing");
}else{
audio.pause();
player.classList.remove("playing");
}
}

function next(){load((i+1)%playlist.length);}
function prev(){load((i-1+playlist.length)%playlist.length);}

window.addEventListener("load",()=>load(0));

let drag=false,ox=0,oy=0;

player.addEventListener("pointerdown",(e)=>{
drag=true;
player.setPointerCapture(e.pointerId);
ox=e.clientX-player.offsetLeft;
oy=e.clientY-player.offsetTop;
});

player.addEventListener("pointermove",(e)=>{
if(!drag)return;
player.style.left=(e.clientX-ox)+"px";
player.style.top=(e.clientY-oy)+"px";
});

player.addEventListener("pointerup",(e)=>{
drag=false;
try{player.releasePointerCapture(e.pointerId);}catch{}
});
</script>

</body>
