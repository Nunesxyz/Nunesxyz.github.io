<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Nunesxyz</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
}

body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
    display: block;
}

/* LAYOUT */
.dashboard {
    width: 90%;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 0 120px;
}

.header {
    margin-bottom: 20px;
    font-size: 22px;
    font-weight: 600;
}

/* STATUS */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.card {
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 14px;
    padding: 20px;
    transition: 0.3s ease;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    border-color: #fff;
    box-shadow: 0 10px 30px rgba(255,255,255,0.12);
}

.card-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 15px;
    opacity: 0.8;
}

.value {
    font-size: 28px;
    font-weight: 600;
}

.label {
    font-size: 13px;
    opacity: 0.6;
}

/* SCRIPTS */
.section-title {
    font-size: 18px;
    margin-bottom: 15px;
}

.script-card {
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 14px;
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.script-card:hover {
    transform: translateY(-8px);
    border-color: #fff;
    box-shadow: 0 10px 25px rgba(255,255,255,0.1);
}

.script-icon {
    width: 26px;
    height: 26px;
}

/* TEAM */
#equipe-heading {
    margin-top: 40px;
    margin-bottom: 15px;
    font-size: 18px;
}

.team-layout {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.team-row {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.team-card {
    min-width: 220px;
}

.team-card {
    flex: 1;
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.3s;
}

.team-card:hover {
    transform: translateY(-6px);
    border-color: #fff;
}

.team-avatar {
    width: 100%;
    height: 110px;
    object-fit: cover;
}

.team-card-body {
    padding: 12px;
}

.team-role-label {
    font-size: 11px;
    opacity: 0.5;
}

.team-name {
    font-size: 14px;
    font-weight: 600;
}

/* PLAYER */
.music-player {
    position: fixed;
    top: 15px;
    left: 15px;
    width: 150px;
    height: 150px;
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 16px;
    padding: 10px;
    z-index: 9999;
    cursor: grab;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    touch-action: none;
}

.music-player:active {
    cursor: grabbing;
}

.music-title {
    font-size: 10px;
    text-align: center;
    opacity: 0.8;
}

.disc {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    border: 2px solid #fff;
    animation: spin 3s linear infinite;
    animation-play-state: paused;
}

.playing .disc {
    animation-play-state: running;
}

/* ===== ONDAS DE ÁUDIO (ADICIONADO) ===== */
.waves {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 14px;
    margin-top: 4px;
}

.waves span {
    width: 2px;
    height: 4px;
    background: #fff;
    opacity: 0.6;
    animation: wave 1s infinite ease-in-out;
}

.playing .waves span {
    animation-play-state: running;
}

.waves span:nth-child(1){animation-delay:0s;}
.waves span:nth-child(2){animation-delay:0.1s;}
.waves span:nth-child(3){animation-delay:0.2s;}
.waves span:nth-child(4){animation-delay:0.3s;}
.waves span:nth-child(5){animation-delay:0.4s;}

@keyframes wave {
    0%,100%{height:4px;}
    50%{height:14px;}
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.controls {
    display: flex;
    gap: 5px;
}

.controls button {
    background: #111;
    border: 1px solid #333;
    color: #fff;
    font-size: 10px;
    padding: 3px 5px;
    border-radius: 6px;
    cursor: pointer;
    transition: .2s;
}

.controls button:hover {
    border-color: #fff;
}
</style>
</head>

<body>

<div class="dashboard">

    <div class="header">Dashboard Status</div>

    <div class="cards">
        <div class="card">
            <div class="card-top"><i data-lucide="activity"></i> Requisições</div>
            <div class="value">0</div>
            <div class="label">Total atual</div>
        </div>

        <div class="card">
            <div class="card-top"><i data-lucide="users"></i> Assinaturas</div>
            <div class="value">0</div>
            <div class="label">Total atual</div>
        </div>
    </div>

    <div class="section-title">Scripts & Bookmarklets</div>

    <div class="script-card">
        <svg class="script-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8">
            <path d="M12 2l2.5 6.5L21 11l-6.5 2.5L12 20l-2.5-6.5L3 11l6.5-2.5L12 2z"/>
        </svg>
        Gemini IA
    </div>

    <h2 id="equipe-heading">Equipe</h2>

    <div class="team-layout">
        <div class="team-row">
            <div class="team-card">
                <img class="team-avatar" src="https://github.com/Nunesxyz.png">
                <div class="team-card-body">
                    <p class="team-name">Nunesxyz</p>
                </div>
            </div>

            <div class="team-card">
                <img class="team-avatar" src="https://github.com/jlbd122ato.png">
                <div class="team-card-body">
                    <p class="team-name">Jlbd122ato</p>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- PLAYER -->
<div class="music-player" id="player">
    <div class="music-title" id="title">To Be Continued</div>

    <div class="disc"></div>

    <!-- ONDAS -->
    <div class="waves">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="controls">
        <button onclick="prev()">⏮</button>
        <button onclick="toggle()">⏯</button>
        <button onclick="next()">⏭</button>
    </div>
</div>

<audio id="audio"></audio>

<script>
lucide.createIcons();

const playlist = [
{
    title:"To Be Continued",
    src:"https://raw.githubusercontent.com/Nunesxyz/musicas-6/main/To_Be_Continued.mp3"
},
{
    title:"Soldier Poet King",
    src:"https://raw.githubusercontent.com/Nunesxyz/musicas-6/main/soldier_poet_king.mp3"
}
];

let i=0;
const audio=document.getElementById("audio");
const player=document.getElementById("player");
const title=document.getElementById("title");

function load(index){
    i=index;
    audio.src=playlist[i].src;
    title.innerText=playlist[i].title;
    audio.play();
    player.classList.add("playing");
}

function toggle(){
    if(audio.paused){
        audio.play();
        player.classList.add("playing");
    }else{
        audio.pause();
        player.classList.remove("playing");
    }
}

function next(){load((i+1)%playlist.length);}
function prev(){load((i-1+playlist.length)%playlist.length);}

window.addEventListener("load",()=>load(0));

let drag=false,ox=0,oy=0;

player.addEventListener("mousedown",(e)=>{
    drag=true;
    ox=e.clientX-player.offsetLeft;
    oy=e.clientY-player.offsetTop;
});

document.addEventListener("mousemove",(e)=>{
    if(!drag)return;
    player.style.left=(e.clientX-ox)+"px";
    player.style.top=(e.clientY-oy)+"px";
});

document.addEventListener("mouseup",()=>drag=false);

player.addEventListener("touchstart",(e)=>{
    const t=e.touches[0];
    drag=true;
    ox=t.clientX-player.offsetLeft;
    oy=t.clientY-player.offsetTop;
});

document.addEventListener("touchmove",(e)=>{
    if(!drag)return;
    const t=e.touches[0];
    player.style.left=(t.clientX-ox)+"px";
    player.style.top=(t.clientY-oy)+"px";
});

document.addEventListener("touchend",()=>drag=false);
</script>

</body>
  </html>
