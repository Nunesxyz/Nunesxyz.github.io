<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Nunesxyz</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
}

body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
}

.dashboard {
    width: 90%;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 0 120px;
}

.header {
    margin-bottom: 20px;
    font-size: 22px;
    font-weight: 600;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.card {
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 14px;
    padding: 20px;
    transition: 0.3s ease;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    border-color: #fff;
    box-shadow: 0 10px 30px rgba(255,255,255,0.12);
}

.card-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 15px;
    opacity: 0.8;
}

.value {
    font-size: 28px;
    font-weight: 600;
}

.label {
    font-size: 13px;
    opacity: 0.6;
}

.section-title {
    font-size: 18px;
    margin-bottom: 15px;
}

.script-card {
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 14px;
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: 0.3s;
    text-decoration: none;
    color: #fff;
}

.script-card:hover {
    transform: translateY(-8px);
    border-color: #fff;
    box-shadow: 0 10px 25px rgba(255,255,255,0.1);
}

#equipe-heading {
    margin-top: 40px;
    margin-bottom: 15px;
    font-size: 18px;
}

.team-layout {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.team-row {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.team-card {
    flex: 0 0 240px;
    max-width: 240px;
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.3s;
}

.team-card:hover {
    transform: translateY(-6px);
    border-color: #fff;
}

.team-avatar {
    width: 100%;
    height: 140px;
    object-fit: cover;
}

.team-card-body {
    padding: 12px;
}

.team-role-label {
    font-size: 11px;
    opacity: 0.5;
}

.team-name {
    font-size: 14px;
    font-weight: 600;
}

.team-username {
    font-size: 12px;
    opacity: 0.6;
}

/* PLAYER */
.music-player {
    position: fixed;
    top: 15px;
    left: 15px;
    width: 150px;
    height: 150px;
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 16px;
    padding: 10px;
    z-index: 9999;
    cursor: grab;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    touch-action: none;
}

.music-player:active {
    cursor: grabbing;
}

.music-title {
    font-size: 10px;
    text-align: center;
    opacity: 0.8;
}

.disc {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    border: 2px solid #fff;
    animation: spin 3s linear infinite;
    animation-play-state: paused;
}

.playing .disc {
    animation-play-state: running;
}

.waves {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 14px;
}

.waves span {
    width: 2px;
    height: 4px;
    background: #fff;
    animation: wave 1s infinite;
}

@keyframes wave {
    0%,100%{height:4px;}
    50%{height:14px;}
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.controls {
    display: flex;
    gap: 5px;
}

.controls button {
    background: #111;
    border: 1px solid #333;
    color: #fff;
    font-size: 10px;
    padding: 3px 5px;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="dashboard">

<div class="header">Dashboard Status</div>

<div class="cards">
<div class="card">
<div class="card-top"><i data-lucide="activity"></i> Requisições</div>
<div class="value">0</div>
<div class="label">Total atual</div>
</div>

<div class="card">
<div class="card-top"><i data-lucide="users"></i> Assinaturas</div>
<div class="value">0</div>
<div class="label">Total atual</div>
</div>
</div>

<div class="section-title">Scripts & Bookmarklets</div>

<a class="script-card" href="matTask.html">
<i data-lucide="calculator"></i>
Matific
</a>

<a class="script-card" href="https://www.google.com.br/search?q=" target="_blank">
<i data-lucide="sparkles"></i>
Gemini IA
</a>

<div class="script-card" id="tarefaSP">
<i data-lucide="file-code"></i>
Tarefa SP
</div>

<div class="script-card" id="redacaoIA">
<i data-lucide="file-text"></i>
Redação IA
</div>

<h2 id="equipe-heading">Equipe</h2>

<div class="team-layout">
<div class="team-row">

<div class="team-card">
<img class="team-avatar" src="https://github.com/Nunesxyz.png">
<div class="team-card-body">
<p class="team-role-label">Fundador</p>
<p class="team-name">Nunesxyz</p>
<p class="team-username">@Nunesxyz</p>
</div>
</div>

<div class="team-card">
<img class="team-avatar" src="https://github.com/jlbd122ato.png">
<div class="team-card-body">
<p class="team-role-label">Co-Fundador</p>
<p class="team-name">Jlbd122ato</p>
<p class="team-username">@jlbd122ato</p>
</div>
</div>

</div>
</div>

</div>

<!-- PLAYER -->
<div class="music-player" id="player">
<div class="music-title" id="title">To Be Continued</div>

<div class="disc"></div>

<div class="waves">
<span></span><span></span><span></span><span></span><span></span>
</div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="toggle()">⏯</button>
<button onclick="next()">⏭</button>
</div>
</div>

<audio id="audio"></audio>

<script>
lucide.createIcons();

/* COPY JS */
const tarefaSPJS = ``;
const redacaoJS = ``;

document.getElementById("tarefaSP").onclick=()=>navigator.clipboard.writeText(tarefaSPJS);
document.getElementById("redacaoIA").onclick=()=>navigator.clipboard.writeText(redacaoJS);

/* PLAYER */
let i=0;
const audio=document.getElementById("audio");
const player=document.getElementById("player");
const title=document.getElementById("title");

const playlist=[
{title:"To Be Continued",src:"https://raw.githubusercontent.com/Nunesxyz/musicas-6/main/To_Be_Continued.mp3"},
{title:"Soldier Poet King",src:"https://raw.githubusercontent.com/Nunesxyz/musicas-6/main/soldier_poet_king.mp3"}
];

function load(index){
i=index;
audio.src=playlist[i].src;
title.innerText=playlist[i].title;
audio.play().catch(()=>{});
player.classList.add("playing");
}

function toggle(){
if(audio.paused){
audio.play().catch(()=>{});
player.classList.add("playing");
}else{
audio.pause();
player.classList.remove("playing");
}
}

function next(){load((i+1)%playlist.length);}
function prev(){load((i-1+playlist.length)%playlist.length);}

window.addEventListener("load",()=>load(0));

let drag=false,ox=0,oy=0;

player.addEventListener("pointerdown",(e)=>{
drag=true;
player.setPointerCapture(e.pointerId);
ox=e.clientX-player.offsetLeft;
oy=e.clientY-player.offsetTop;
});

player.addEventListener("pointermove",(e)=>{
if(!drag)return;
player.style.left=(e.clientX-ox)+"px";
player.style.top=(e.clientY-oy)+"px";
});

player.addEventListener("pointerup",(e)=>{
drag=false;
try{player.releasePointerCapture(e.pointerId);}catch{}
});
</script>

</body>
    </html>
